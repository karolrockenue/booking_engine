<html lang="en">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin — Booking Engine</title>
<style>
  :root {
    --bg: #F2F2F2;
    --surface: #FFFFFF;
    --border: #E5E0D8;
    --border-soft: #EFEAE0;
    --ink: #1A1A1A;
    --ink-2: #4B5563;
    --muted: #6B7280;
    --navy: #2C3E50;
    --navy-soft: #34495E;
    --green: #059669;
    --green-soft: #D1FAE5;
    --amber: #B45309;
    --amber-soft: #FEF3C7;
    --red: #B91C1C;
    --red-soft: #FEE2E2;
    --blue: #1D4ED8;
    --blue-soft: #DBEAFE;
    --link: #2563EB;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { font-family: inherit; cursor: pointer; }

  /* Topbar */
  .topbar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar .brand { font-weight: 600; font-size: 15px; letter-spacing: -0.01em; }
  .topbar .brand .muted { color: var(--muted); font-weight: 400; margin-left: 8px; }
  .topbar .right { display: flex; align-items: center; gap: 16px; color: var(--muted); font-size: 13px; }
  .topbar .right .pill { background: var(--bg); padding: 4px 10px; border-radius: 999px; font-size: 12px; }

  /* Layout */
  main { max-width: 1240px; margin: 0 auto; padding: 28px 24px 80px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 4px; }
  h2 { font-size: 16px; font-weight: 600; margin: 0 0 12px; }
  h3 { font-size: 13px; font-weight: 600; margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-2); }
  .lead { color: var(--muted); margin: 0 0 20px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .grow { flex: 1; }
  .right { margin-left: auto; }
  .muted { color: var(--muted); }

  /* Pills */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 9px; border-radius: 999px;
    font-size: 11.5px; font-weight: 500;
    border: 1px solid transparent;
  }
  .pill.dot::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; display: inline-block; }
  .pill.green { background: var(--green-soft); color: var(--green); }
  .pill.amber { background: var(--amber-soft); color: var(--amber); }
  .pill.red { background: var(--red-soft); color: var(--red); }
  .pill.blue { background: var(--blue-soft); color: var(--blue); }
  .pill.gray { background: #F3F4F6; color: var(--muted); }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 13px; font-weight: 500;
    color: var(--ink);
  }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
  .btn.primary:hover { background: var(--navy-soft); }
  .btn.danger { color: var(--red); border-color: var(--red-soft); }
  .btn.sm { padding: 4px 10px; font-size: 12px; }
  .btn.ghost { border-color: transparent; }
  .btn.ghost:hover { background: var(--bg); }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .card-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 12px;
  }
  .card-body { padding: 16px; }
  .card-body.dense { padding: 0; }

  /* Tile grid */
  .tile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: box-shadow .15s, transform .15s;
  }
  .tile:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,.06);
    transform: translateY(-1px);
  }
  .tile-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .tile-name { font-weight: 600; letter-spacing: -0.005em; }
  .tile-domain { color: var(--muted); font-size: 12.5px; margin-top: 2px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .tile-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  .tile-stats {
    display: flex; gap: 14px;
    margin-top: 14px; padding-top: 12px;
    border-top: 1px solid var(--border-soft);
    font-size: 12.5px;
    color: var(--muted);
  }
  .tile-stats .num { color: var(--ink); font-weight: 600; }

  /* Workspace */
  .ws-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .ws-back { font-size: 13px; color: var(--muted); cursor: pointer; }
  .ws-back:hover { color: var(--ink); }
  .ws-title { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .ws-domain { color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--ink); border-bottom-color: var(--navy); font-weight: 500; }
  .tab .count { background: var(--bg); border-radius: 999px; padding: 1px 7px; font-size: 11px; font-weight: 500; }
  .tab.has-alert .count { background: var(--red-soft); color: var(--red); }

  /* Two-col workspace layout */
  .ws-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; align-items: start; }
  @media (max-width: 900px) { .ws-grid { grid-template-columns: 1fr; } }

  /* Checklist */
  .checklist { list-style: none; padding: 0; margin: 0; }
  .checklist li {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border-soft);
    font-size: 13.5px;
  }
  .checklist li:last-child { border-bottom: none; }
  .checklist .icon {
    width: 18px; height: 18px;
    border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .checklist .icon.done { background: var(--green-soft); color: var(--green); }
  .checklist .icon.todo { background: #F3F4F6; color: var(--muted); border: 1px solid var(--border); }
  .checklist .icon.warn { background: var(--amber-soft); color: var(--amber); }
  .checklist .text { flex: 1; }
  .checklist .meta { color: var(--muted); font-size: 12px; }
  .checklist li.done .text { color: var(--ink-2); }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 16px; border-bottom: 1px solid var(--border-soft); }
  th { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); font-weight: 600; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: var(--bg); }
  tbody tr:last-child td { border-bottom: none; }
  td.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; color: var(--ink-2); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }

  /* Forms */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin-bottom: 4px; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 4px;
    font-family: inherit; font-size: 13px;
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 64px; }
  .field .hint { font-size: 11.5px; color: var(--muted); margin-top: 4px; }

  /* Photos grid */
  .photo-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .photo {
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, #d4c5a9 0%, #8c7a5b 100%);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    display: flex; align-items: flex-end;
    padding: 8px;
    border: 1px solid var(--border);
  }
  .photo .label { background: rgba(0,0,0,0.45); padding: 2px 6px; border-radius: 2px; }
  .photo.alt-1 { background: linear-gradient(135deg, #b8a888 0%, #6b5a3f 100%); }
  .photo.alt-2 { background: linear-gradient(135deg, #c9b89a 0%, #7d6a4d 100%); }
  .photo.alt-3 { background: linear-gradient(135deg, #a39177 0%, #574936 100%); }
  .photo.alt-4 { background: linear-gradient(135deg, #d8c8a8 0%, #948167 100%); }
  .photo.alt-5 { background: linear-gradient(135deg, #b09a7d 0%, #6e5d44 100%); }

  .upload {
    aspect-ratio: 4/3;
    border: 2px dashed var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
  }
  .upload:hover { border-color: var(--navy); color: var(--ink); }
  .upload .plus { font-size: 22px; line-height: 1; }

  /* Rate plan rows */
  .rate-row {
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 8px;
    background: #fff;
  }
  .rate-row-head {
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
  }
  .rate-row-head:hover { background: var(--bg); }
  .rate-row.open .rate-row-body { display: block; }
  .rate-row-body { display: none; padding: 16px; border-top: 1px solid var(--border-soft); background: var(--bg); }
  .rate-row .name { font-weight: 500; }
  .rate-row .id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; color: var(--muted); }
  .chevron { color: var(--muted); transition: transform .15s; }
  .rate-row.open .chevron { transform: rotate(90deg); }

  /* Stat blocks */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .stat {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .stat .label { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .stat .value { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-top: 2px; }
  .stat .delta { font-size: 12px; margin-top: 2px; }

  /* Alert rows */
  .alert {
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 4px;
    background: #fff;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .alert.danger { border-left-color: var(--red); }
  .alert.info { border-left-color: var(--blue); }
  .alert .body { flex: 1; }
  .alert .title { font-weight: 500; font-size: 13.5px; }
  .alert .desc { color: var(--muted); font-size: 12.5px; margin-top: 2px; }

  /* Empty state */
  .empty {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
  }

  /* Mock-only hint */
  .mock-banner {
    background: #FEF3C7;
    color: #78350F;
    text-align: center;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
  }

  /* DNS table */
  .dns {
    background: #0F172A;
    color: #E2E8F0;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    padding: 12px 14px;
    border-radius: 4px;
    line-height: 1.7;
  }
  .dns .k { color: #94A3B8; }

  /* Toolbar */
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 14px;
  }
  .toolbar input[type=search] {
    flex: 1; max-width: 320px;
    padding: 7px 12px;
    border: 1px solid var(--border); border-radius: 4px;
    font-size: 13px; background: #fff;
  }

  /* Misc */
  .kv { display: flex; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border-soft); font-size: 13px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { width: 160px; color: var(--muted); flex-shrink: 0; }
  .kv .v { flex: 1; }

  .stack > * + * { margin-top: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .hidden { display: none !important; }
</style>
</head>

function statusPill(s) {

  const m = map[s] || { kind: 'gray', text: s };
  return `<span class="pill ${m.kind} dot">${m.text}</span>`;
}

// ─────── Alerts ───────
function renderAlerts(h) {
  const alerts = ALERTS[h.id] || [];
  if (!alerts.length) {
    return `<div class="card"><div class="empty">All clear. Nothing needing attention.</div></div>`;
  }
  return `
    <div class="toolbar">
      <button class="btn sm">All ${alerts.length}</button>
      <button class="btn sm">Critical ${alerts.filter(a => a.kind === 'danger').length}</button>
      <button class="btn sm">Warning ${alerts.filter(a => a.kind === 'amber').length}</button>
      <button class="btn sm">Info ${alerts.filter(a => a.kind === 'info').length}</button>
    </div>
    ${alerts.map(a => `
      <div class="alert ${a.kind}">
        <div class="body">
          <div class="title">${a.title}</div>
          <div class="desc">${a.desc}</div>
        </div>
        ${a.cta ? `<button class="btn sm">${a.cta}</button>` : ''}
        <button class="btn ghost sm" title="Dismiss">✕</button>
      </div>
    `).join('')}
    <p class="muted" style="font-size: 12px; margin-top: 16px;">
      Alerts are auto-generated from the operational signals (failed postReservation, dropped extras, expiring tokens, stale webhooks, Stripe restrictions). Each one points at a concrete action — no decoration.
    </p>
  `;
}

render();
